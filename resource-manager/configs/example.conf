# Resource Manager — Example Configuration
# ADR-002 Config Grammar

group web-server {
    mode service;

    match "nginx" {
        type prefix;
    }

    controller cpu {
        item cpu.max = "100000 100000";
        item cpu.weight = "100";
    }

    controller memory {
        item memory.max = "1G";
        item memory.high = "800M";
    }

    controller cpuset {
        item cpuset.cpus = "0-3";
        item cpuset.mems = "0";
    }
}

group db-cluster {
    mode entity;

    match "mysqld" {
        type exact;
    }

    controller cpu {
        item cpu.max = "200000 100000";
        item cpu.weight = "200";
    }

    controller memory {
        item memory.max = "4G";
    }

    controller io {
        item io.max = "8:16 rbps=1048576 wbps=1048576";
        item io.weight = "200";
    }

    controller pids {
        item pids.max = "1024";
    }
}
